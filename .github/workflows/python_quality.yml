name: Python Quality

on:
  push:
    branches: [ main ]
    paths:
      - "blocks/**"
      - "tools/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/python_quality.yml"
  pull_request:
    paths:
      - "blocks/**"
      - "tools/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/python_quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Ruff and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff
        run: python -m ruff check blocks tools tests

      - name: Run pytest
        run: python -m pytest -q

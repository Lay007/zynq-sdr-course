name: Block 5 HDL

on:
  push:
    branches: [ main ]
    paths:
      - "blocks/block_05_fpga_hdl_flow/**"
      - ".github/workflows/block5_hdl.yml"
  pull_request:
    paths:
      - "blocks/block_05_fpga_hdl_flow/**"
      - ".github/workflows/block5_hdl.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  iverilog-sim:
    name: Run Icarus Verilog simulations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Compile iq_passthrough testbench
        run: |
          iverilog -g2012 \
            -o blocks/block_05_fpga_hdl_flow/tb/tb_iq_passthrough.out \
            blocks/block_05_fpga_hdl_flow/rtl/iq_passthrough.v \
            blocks/block_05_fpga_hdl_flow/tb/tb_iq_passthrough.v

      - name: Run iq_passthrough simulation
        run: |
          vvp blocks/block_05_fpga_hdl_flow/tb/tb_iq_passthrough.out

      - name: Generate FIR IQ 4-tap vectors
        run: |
          python blocks/block_05_fpga_hdl_flow/python/generate_fir_iq_4tap_vectors.py

      - name: Compile FIR IQ 4-tap testbench
        run: |
          iverilog -g2012 \
            -o blocks/block_05_fpga_hdl_flow/tb/tb_fir_iq_4tap.out \
            blocks/block_05_fpga_hdl_flow/rtl/fir_iq_4tap.v \
            blocks/block_05_fpga_hdl_flow/tb/tb_fir_iq_4tap.v

      - name: Run FIR IQ 4-tap simulation
        run: |
          vvp blocks/block_05_fpga_hdl_flow/tb/tb_fir_iq_4tap.out

      - name: Upload VCD waveforms
        uses: actions/upload-artifact@v4
        with:
          name: block5-hdl-waveforms
          path: |
            tb_iq_passthrough.vcd
            tb_fir_iq_4tap.vcd
          if-no-files-found: warn

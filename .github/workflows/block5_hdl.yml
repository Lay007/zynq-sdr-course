name: Block 5 HDL

on:
  push:
    branches: [ main ]
    paths:
      - "blocks/block_05_fpga_hdl_flow/**"
      - "tools/run_block5_hdl_smoke.sh"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/block5_hdl.yml"
  pull_request:
    paths:
      - "blocks/block_05_fpga_hdl_flow/**"
      - "tools/run_block5_hdl_smoke.sh"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/block5_hdl.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  iverilog-sim:
    name: Run Icarus Verilog simulations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run Block 5 HDL smoke suite
        shell: bash
        run: bash tools/run_block5_hdl_smoke.sh

      - name: Upload VCD waveforms
        uses: actions/upload-artifact@v7
        with:
          name: block5-hdl-waveforms
          path: |
            tb_iq_passthrough.vcd
            tb_fir_iq_4tap.vcd
            tb_nco_mixer_iq.vcd
            tb_axis_iq_passthrough.vcd
          if-no-files-found: warn

name: Block 7 TX RX

on:
  push:
    branches: [ main ]
    paths:
      - "blocks/block_07_tx_rx_chains/**"
      - ".github/workflows/block7_tx_rx.yml"
  pull_request:
    paths:
      - "blocks/block_07_tx_rx_chains/**"
      - ".github/workflows/block7_tx_rx.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  duc-ddc-model:
    name: Run DUC/DDC frequency translation model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      - name: Run Lab 7.2 DUC/DDC model
        run: |
          python blocks/block_07_tx_rx_chains/python/lab_7_2_duc_ddc_frequency_translation.py

      - name: Validate generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            docs/assets/lab72_duc_ddc_tx_spectrum.png
            docs/assets/lab72_duc_ddc_rx_spectrum.png
            docs/assets/lab72_duc_ddc_frequency_plan.png
            docs/assets/lab72_duc_ddc_metrics.json
          )

          for file in "${expected[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty generated artifact: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Upload generated TX/RX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: block7-duc-ddc-artifacts
          path: |
            docs/assets/lab72_duc_ddc_tx_spectrum.png
            docs/assets/lab72_duc_ddc_rx_spectrum.png
            docs/assets/lab72_duc_ddc_frequency_plan.png
            docs/assets/lab72_duc_ddc_metrics.json
          if-no-files-found: error

name: Docs Assets Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-assets-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check local Markdown assets
        run: python tools/check_markdown_assets.py

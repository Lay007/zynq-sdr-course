name: Docs Assets Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-assets-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check local Markdown assets
        run: python tools/check_markdown_assets.py

name: Experiment Manifests Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  experiment-manifests-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate experiment manifests
        run: python tools/check_experiment_manifests.py

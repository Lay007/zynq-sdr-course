name: Experiment Manifests Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  experiment-manifests-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate experiment manifests
        run: python tools/check_experiment_manifests.py

name: Block 9 Recording Analysis

on:
  push:
    branches: [ main ]
    paths:
      - "blocks/block_09_recording_and_analysis_tools/**"
      - ".github/workflows/block9_recording_analysis.yml"
  pull_request:
    paths:
      - "blocks/block_09_recording_and_analysis_tools/**"
      - ".github/workflows/block9_recording_analysis.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  iq-analysis:
    name: Run IQ recording analysis labs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      - name: Run Lab 9.2 CI16 IQ analyzer
        run: |
          python blocks/block_09_recording_and_analysis_tools/python/lab_9_2_read_ci16_iq_and_analyze.py

      - name: Run Lab 9.3 multi-format IQ reader
        run: |
          python blocks/block_09_recording_and_analysis_tools/python/lab_9_3_multi_format_iq_reader.py

      - name: Validate generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            docs/assets/lab92_ci16_iq_spectrum.png
            docs/assets/lab92_ci16_iq_time_preview.png
            docs/assets/lab92_ci16_iq_metrics.json
            blocks/block_09_recording_and_analysis_tools/assets/lab92_synthetic_ci16_tone.ci16
            docs/assets/lab93_multiformat_iq_metrics.json
            docs/assets/lab93_multiformat_iq_spectrum_ci16.png
            docs/assets/lab93_multiformat_iq_spectrum_cu8.png
            docs/assets/lab93_multiformat_iq_spectrum_cf32.png
          )

          for file in "${expected[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty generated artifact: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Upload generated recording-analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: block9-recording-analysis-artifacts
          path: |
            docs/assets/lab92_ci16_iq_spectrum.png
            docs/assets/lab92_ci16_iq_time_preview.png
            docs/assets/lab92_ci16_iq_metrics.json
            blocks/block_09_recording_and_analysis_tools/assets/lab92_synthetic_ci16_tone.ci16
            docs/assets/lab93_multiformat_iq_metrics.json
            docs/assets/lab93_multiformat_iq_spectrum_ci16.png
            docs/assets/lab93_multiformat_iq_spectrum_cu8.png
            docs/assets/lab93_multiformat_iq_spectrum_cf32.png
          if-no-files-found: error

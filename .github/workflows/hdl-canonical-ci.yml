name: HDL Canonical Vector CI

on:
  push:
    paths:
      - "blocks/block_05_fpga_hdl_flow/**"
      - "tools/run_block5_hdl_smoke.sh"
      - "tools/run_block5_hdl_smoke.py"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/hdl-canonical-ci.yml"
  pull_request:
    paths:
      - "blocks/block_05_fpga_hdl_flow/**"
      - "tools/run_block5_hdl_smoke.sh"
      - "tools/run_block5_hdl_smoke.py"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/hdl-canonical-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hdl-canonical:
    name: Run HDL tests with generated vectors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python vector-generation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Setup Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run Block 5 HDL smoke suite
        shell: bash
        run: bash tools/run_block5_hdl_smoke.sh

      - name: Upload HDL CI artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hdl-canonical-artifacts
          path: |
            blocks/block_05_fpga_hdl_flow/tb/*.out
            blocks/block_05_fpga_hdl_flow/tb/*.vcd
            blocks/block_05_fpga_hdl_flow/tb/*_vectors.txt
            blocks/block_05_fpga_hdl_flow/tb/*_bits.txt
            blocks/block_05_fpga_hdl_flow/tb/*_meta.txt
            blocks/block_05_fpga_hdl_flow/rtl/*.mem
          if-no-files-found: warn

name: Generate IEEE Plots

on:
  push:
    branches: [ main ]

jobs:
  generate:
    if: "!contains(github.event.head_commit.message, 'Auto-update IEEE plots')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install matplotlib numpy

      - name: Generate plots
        run: python tools/generate_ieee_plots.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/assets
          git commit -m "Auto-update IEEE plots" || echo "No changes"
          git push

name: Generate IEEE Plots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: "!contains(github.event.head_commit.message, 'Auto-update IEEE plots')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib numpy

      - name: Generate plots
        run: python tools/generate_ieee_plots.py

      - name: Commit generated plots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets
          if git diff --cached --quiet; then
            echo "No plot changes"
          else
            git commit -m "Auto-update IEEE plots"
            git push
          fi

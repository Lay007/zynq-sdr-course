name: Documentation issue
description: Report unclear, outdated or missing course documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "docs/en/... or blocks/block_..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected improvement
      description: What should be added, corrected or clarified?
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Language scope
      options:
        - English only
        - Russian only
        - Both English and Russian
        - Not language-specific
    validations:
      required: true

site_name: Zynq SDR Course
site_description: Bilingual SDR course from theory to board-level implementation
site_url: https://lay007.github.io/zynq-sdr-course/
repo_url: https://github.com/Lay007/zynq-sdr-course
repo_name: Lay007/zynq-sdr-course
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Demo (IEEE figures): demo.md
  - Русский:
      - Обзор курса: ru/index.md
  - English:
      - Course overview: en/index.md

site_name: Zynq SDR Course
site_description: Bilingual SDR course from theory to board-level implementation
site_url: https://lay007.github.io/zynq-sdr-course/
repo_url: https://github.com/Lay007/zynq-sdr-course
repo_name: Lay007/zynq-sdr-course
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - System:
      - "Model → FPGA → RF → Measurement": model-to-measurement.md
      - "Lab 1: Tone → RF → IQ → Analysis": lab01-tone-rf-iq-analysis.md
      - "Lab 2: AM/FM Spectrum": lab02-am-fm-spectrum.md
      - "Lab 3: QPSK Constellation": lab03-qpsk-constellation.md
  - "DSP → FPGA Bridge": dsp-to-fpga.md
  - "Measurement Errors": measurement-errors.md
  - "Course Quality":
      - "Quality roadmap": course-quality-roadmap.md
      - "Completion matrix": course-completion-matrix.md
      - "Reproducibility guide": reproducibility-guide.md
      - "Lab report template": lab-report-template.md
      - "IQ metadata guide": iq-recording-metadata.md
  - "Demo (IEEE figures)": demo.md
  - "GitHub demo notes": demo_readme.md
  - "IEEE-style guide": ieee_style_guide.md
  - Русский:
      - "Обзор курса": ru/index.md
      - "Структура курса": ru/course-structure.md
      - "Лабораторный трек": ru/lab-track.md
      - "Media guide": ru/media-guide.md
      - "Блоки курса":
          - "01. Введение в SDR": ru/blocks/01-intro.md
          - "02. Сигналы и дискретизация": ru/blocks/02-signals-and-sampling.md
          - "03. Базовые DSP-операции": ru/blocks/03-dsp-basics.md
          - "04. Simulink и fixed-point": ru/blocks/04-simulink-and-fixed-point.md
          - "05. FPGA / HDL flow": ru/blocks/05-fpga-hdl-flow.md
          - "06. RF frontend и AD9363": ru/blocks/06-rf-frontend-and-ad9363.md
          - "07. TX/RX chains": ru/blocks/07-tx-rx-chains.md
          - "08. Modulation and synchronization": ru/blocks/08-modulation-and-synchronization.md
          - "09. Recording and analysis tools": ru/blocks/09-recording-and-analysis-tools.md
          - "10. KiCad and basic electronics": ru/blocks/10-kicad-and-basic-electronics.md
          - "11. Integrated SDR project": ru/blocks/11-integrated-sdr-project.md
          - "12. Final projects": ru/blocks/12-final-projects.md
      - "Лаборатории Block 3":

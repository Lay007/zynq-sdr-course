          - "08. Modulation and synchronization": en/blocks/08-modulation-and-synchronization.md
          - "09. Recording and analysis tools": en/blocks/09-recording-and-analysis-tools.md
          - "10. KiCad and basic electronics": en/blocks/10-kicad-and-basic-electronics.md

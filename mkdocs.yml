site_name: Zynq SDR Course
site_description: Bilingual SDR course from theory to board-level implementation
site_url: https://lay007.github.io/zynq-sdr-course/
repo_url: https://github.com/Lay007/zynq-sdr-course
repo_name: Lay007/zynq-sdr-course
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Русский:
      - Обзор курса: ru/index.md
      - Структура курса: ru/course-structure.md
      - Лабораторный трек: ru/lab-track.md
      - Медиа-гайд: ru/media-guide.md
      - Блоки:
          - Блок 1. Введение в SDR: ru/blocks/01-intro.md
          - Блок 2. Сигналы и дискретизация: ru/blocks/02-signals-and-sampling.md
          - Блок 3. Основы DSP: ru/blocks/03-dsp-basics.md
          - Блок 4. Simulink и fixed-point: ru/blocks/04-simulink-and-fixed-point.md
          - Блок 5. FPGA / HDL Flow: ru/blocks/05-fpga-hdl-flow.md
          - Блок 6. Радиотракт и AD9363: ru/blocks/06-rf-frontend-and-ad9363.md
          - Блок 7. Тракты TX/RX: ru/blocks/07-tx-rx-chains.md
          - Блок 8. Модуляция и синхронизация: ru/blocks/08-modulation-and-synchronization.md
          - Блок 9. Инструменты записи и анализа: ru/blocks/09-recording-and-analysis-tools.md
          - Блок 10. KiCad и базовая электроника: ru/blocks/10-kicad-and-basic-electronics.md
          - Блок 11. Интегрированный SDR-проект: ru/blocks/11-integrated-sdr-project.md
          - Блок 12. Итоговые проекты: ru/blocks/12-final-projects.md
  - English:
      - Course overview: en/index.md
      - Course structure: en/course-structure.md
      - Lab track: en/lab-track.md
      - Media guide: en/media-guide.md
      - Blocks:
          - Block 1. Introduction to SDR: en/blocks/01-intro.md
          - Block 2. Signals and Sampling: en/blocks/02-signals-and-sampling.md
          - Block 3. DSP Basics: en/blocks/03-dsp-basics.md
          - Block 4. Simulink and Fixed-Point: en/blocks/04-simulink-and-fixed-point.md
          - Block 5. FPGA / HDL Flow: en/blocks/05-fpga-hdl-flow.md
          - Block 6. RF Frontend and AD9363: en/blocks/06-rf-frontend-and-ad9363.md
          - Block 7. TX/RX Chains: en/blocks/07-tx-rx-chains.md
          - Block 8. Modulation and Synchronization: en/blocks/08-modulation-and-synchronization.md
          - Block 9. Recording and Analysis Tools: en/blocks/09-recording-and-analysis-tools.md
          - Block 10. KiCad and Basic Electronics: en/blocks/10-kicad-and-basic-electronics.md
          - Block 11. Integrated SDR Project: en/blocks/11-integrated-sdr-project.md
          - Block 12. Final Projects: en/blocks/12-final-projects.md

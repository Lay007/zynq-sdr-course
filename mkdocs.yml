site_name: Zynq SDR Course
site_description: Bilingual SDR course from theory to board-level implementation
site_url: https://lay007.github.io/zynq-sdr-course/
repo_url: https://github.com/Lay007/zynq-sdr-course
repo_name: Lay007/zynq-sdr-course
edit_uri: edit/main/

docs_dir: docs
site_dir: site

# Compatibility aliases kept for relative links inside shared Block 11 snippets.
# They intentionally do not appear in the learner navigation.
not_in_nav: |
  en/labs/lab_11_19_runtime_bridge_txrx_self_timed_bringup.md
  en/labs/lab_11_22_capture_runtime_pl_rtl_monitor_wav.md
  en/labs/lab_11_24_capture_dds_tone_rtl_monitor_wav.md
  en/labs/lab_11_25_stock_vs_runtime_dds_tone_sweep.md
  ru/labs/lab_11_19_runtime_bridge_txrx_self_timed_bringup.md
  ru/labs/lab_11_22_capture_runtime_pl_rtl_monitor_wav.md
  ru/labs/lab_11_24_capture_dds_tone_rtl_monitor_wav.md
  ru/labs/lab_11_25_stock_vs_runtime_dds_tone_sweep.md

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format


<text class="small" x="118" y="202">генерация тестового сигнала</text>
<rect class="box" x="830" y="100" width="250" height="160"/>
<text class="txt" x="885" y="145">RTL-SDR</text>
<text class="small" x="874" y="174">внешний приём сигнала</text>
<rect class="box" x="830" y="330" width="250" height="160"/>
<text class="txt" x="924" y="375">ПК</text>
<text class="small" x="882" y="404">HDSDR / MATLAB / Python</text>
<text class="small" x="902" y="432">GNU Radio / KiCad</text>

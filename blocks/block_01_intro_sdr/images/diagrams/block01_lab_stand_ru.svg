<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
<style>
    .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 18; ry: 18; }
    .txt { font: 600 22px Arial, sans-serif; fill: #111827; }
    .small { font: 400 16px Arial, sans-serif; fill: #475569; }
    .label { font: 600 18px Arial, sans-serif; fill: #2563eb; }
    .line { stroke: #2563eb; stroke-width: 4; fill: none; }
    .dash { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 10 8; }
</style>

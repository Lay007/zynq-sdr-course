  <text x="54" y="65" class="title">Block 2: Signals, Spectrum, Sampling and I/Q</text><text x="56" y="100" class="sub">turn a captured waveform into correctly interpreted engineering data</text>
  <g transform="translate(56 165)">
    <g><rect class="card" width="190" height="135" rx="18"/><rect class="nbox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">01</text><path class="icon" d="M55 64 C67 38 78 90 90 64 S113 38 125 64 S148 90 160 64"/><path class="muted" d="M52 64H163"/><text class="bt" x="95" y="101">Signal</text><text class="desc" x="95" y="122">tone, level, phase</text></g>
    <g transform="translate(215 0)"><rect class="card" width="190" height="135" rx="18"/><rect class="nbox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">02</text><path class="icon" d="M58 80V45M78 80V32M98 80V50M118 80V28M138 80V58"/><path class="muted" d="M50 80H150"/><text class="bt" x="95" y="101">Sampling</text><text class="desc" x="95" y="122">Fs, Nyquist, aliasing</text></g>

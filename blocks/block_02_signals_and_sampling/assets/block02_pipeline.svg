    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(260 150) scale(580 260)" gradientUnits="userSpaceOnUse"><stop stop-color="#1db8ff" stop-opacity="0.25"/><stop offset="1" stop-color="#1db8ff" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10 Z" fill="#78dcff"/></marker>
    <style>
      .title{font:700 34px DejaVu Sans,Arial,sans-serif;fill:#ecfbff}.sub{font:400 18px DejaVu Sans,Arial,sans-serif;fill:#b6e3f6}.card{fill:#0f2948;stroke:#62d2ff;stroke-width:2;filter:url(#shadow)}.nbox{fill:#1f749c;fill-opacity:.55;stroke:#78e0ff;stroke-opacity:.7}.num{font:700 12px DejaVu Sans,Arial,sans-serif;fill:#f0fcff;text-anchor:middle}.bt{font:700 21px DejaVu Sans,Arial,sans-serif;fill:#f0fbff;text-anchor:middle}.desc{font:400 14px DejaVu Sans,Arial,sans-serif;fill:#b9d9ea;text-anchor:middle}.line{stroke:#78dcff;stroke-width:3;stroke-linecap:round;marker-end:url(#arrow)}.fb{stroke:#b093ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.icon{stroke:#7ee4ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.icon2{stroke:#a987ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.muted{stroke:#7ee4ff;stroke-opacity:.35;stroke-width:1}.foot{font:400 17px DejaVu Sans,Arial,sans-serif;fill:#bddff0}.strong{font:700 17px DejaVu Sans,Arial,sans-serif;fill:#effbff}
    </style>

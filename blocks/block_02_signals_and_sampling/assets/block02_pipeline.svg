    <g transform="translate(860 0)"><rect class="card" width="190" height="135" rx="18"/><rect class="nbox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">05</text><text x="60" y="48" style="font:400 14px DejaVu Sans,Arial;fill:#7ee4ff">Fs = 2.4 MS/s</text><text x="60" y="68" style="font:400 14px DejaVu Sans,Arial;fill:#7ee4ff">Fc = 915 MHz</text><text x="60" y="88" style="font:400 14px DejaVu Sans,Arial;fill:#7ee4ff">IQ = CI16</text><text class="bt" x="95" y="101">Metadata</text><text class="desc" x="95" y="122">format, gain, duration</text></g>
    <g transform="translate(1075 0)"><rect class="card" width="190" height="135" rx="18"/><rect class="nbox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">06</text><rect x="56" y="39" width="80" height="48" rx="8" fill="#143c5f" stroke="#7ee4ff" stroke-width="3"/><path class="icon2" d="M66 64 C75 46 86 82 96 64 S118 47 128 64"/><text class="bt" x="95" y="101">Validation</text><text class="desc" x="95" y="122">axis and error checks</text></g>

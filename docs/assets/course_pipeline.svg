    </g>
    <g transform="translate(202 0)">
      <rect class="card" width="178" height="148" rx="18"/>
      <rect class="numBox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">02</text>
      <path class="icon" d="M50 82H132M50 82V34"/><path class="icon2" d="M56 72 L74 58 L94 62 L112 44 L130 36"/>
      <text class="block" x="89" y="108">Modeling</text><text class="desc" x="89" y="130">MATLAB / Simulink</text><text class="desc" x="89" y="147">reference signals</text>
    </g>
    <g transform="translate(404 0)">
      <rect class="card" width="178" height="148" rx="18"/>
      <rect class="numBox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">03</text>
      <text x="50" y="51" style="font:400 15px DejaVu Sans,Arial;fill:#7ee4ff">0 1 1 0</text><text x="50" y="70" style="font:400 15px DejaVu Sans,Arial;fill:#7ee4ff">Q1.15</text><text x="50" y="89" style="font:400 15px DejaVu Sans,Arial;fill:#7ee4ff">1 0 0 1</text>
      <text class="block" x="89" y="108">Fixed-Point</text><text class="desc" x="89" y="130">word length</text><text class="desc" x="89" y="147">quantization</text>
    </g>
    <g transform="translate(606 0)">
      <rect class="card" width="178" height="148" rx="18"/>
      <rect class="numBox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">04</text>
      <rect x="60" y="38" width="58" height="48" rx="6" fill="#143c5f" stroke="#7ee4ff" stroke-width="3"/><path class="icon" d="M48 46H60M48 58H60M48 70H60M118 46H130M118 58H130M118 70H130M72 28V38M90 28V38M108 28V38M72 86V96M90 86V96M108 86V96"/>
      <text class="block" x="89" y="108">HDL / FPGA</text><text class="desc" x="89" y="130">Verilog blocks</text><text class="desc" x="89" y="147">streaming DSP</text>
    </g>
    <g transform="translate(808 0)">
      <rect class="card" width="178" height="148" rx="18"/>
      <rect class="numBox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">05</text>
      <rect x="48" y="38" width="82" height="48" rx="8" fill="#143c5f" stroke="#7ee4ff" stroke-width="3"/><circle cx="70" cy="62" r="6" fill="#7ee4ff"/><circle cx="106" cy="62" r="6" fill="#a987ff"/><path class="icon" d="M132 62H150"/>
      <text class="block" x="89" y="108">Zynq / AD9363</text><text class="desc" x="89" y="130">board setup</text><text class="desc" x="89" y="147">RF frontend</text>
    </g>
    <g transform="translate(1010 0)">
      <rect class="card" width="178" height="148" rx="18"/>
      <rect class="numBox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">06</text>
      <rect x="48" y="40" width="82" height="50" rx="8" fill="#143c5f" stroke="#7ee4ff" stroke-width="3"/><path class="icon2" d="M58 66 C68 45 78 86 89 66 S112 46 123 66"/><circle cx="120" cy="80" r="4" fill="#7ee4ff"/>
      <text class="block" x="89" y="108">Measurement</text><text class="desc" x="89" y="130">RTL-SDR / HDSDR</text><text class="desc" x="89" y="147">IQ recording</text>
    </g>
    <g transform="translate(1212 0)">
      <rect class="card" width="178" height="148" rx="18"/>
      <rect class="numBox" x="12" y="12" width="34" height="26" rx="13"/><text class="num" x="29" y="30">07</text>
      <path class="muted" d="M48 66H130M89 34V94"/><circle cx="68" cy="51" r="4" fill="#7ee4ff"/><circle cx="110" cy="51" r="4" fill="#7ee4ff"/><circle cx="68" cy="82" r="4" fill="#a987ff"/><circle cx="110" cy="82" r="4" fill="#a987ff"/>
      <text class="block" x="89" y="108">Analysis</text><text class="desc" x="89" y="130">FFT / EVM / BER</text><text class="desc" x="89" y="147">report</text>
    </g>

    <path class="line" d="M182 74H194"/><path class="line" d="M384 74H396"/><path class="line" d="M586 74H598"/><path class="line" d="M788 74H800"/><path class="line" d="M990 74H1002"/><path class="line" d="M1192 74H1204"/>
    <path class="feedback" d="M1301 164V218H291V164"/>
    <text x="314" y="231" style="font:400 15px DejaVu Sans, Arial;fill:#c9c5ff">feedback: measured IQ data improves models, HDL parameters and RF configuration</text>

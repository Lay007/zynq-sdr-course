<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.5" stop-color="#0a203c"/>
      <stop offset="1" stop-color="#102b4c"/>
    </linearGradient>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 160) rotate(20) scale(620 310)">
      <stop stop-color="#1db8ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#1db8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 390) rotate(-25) scale(540 270)">
      <stop stop-color="#8c6cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8c6cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#78dcff"/>
    </marker>
    <style>
      .title{font:700 36px DejaVu Sans, Arial, sans-serif;fill:#ecfbff}
      .subtitle{font:400 19px DejaVu Sans, Arial, sans-serif;fill:#b6e3f6}
      .card{fill:#0f2948;stroke:#62d2ff;stroke-width:2;filter:url(#shadow)}
      .numBox{fill:#1f749c;fill-opacity:.55;stroke:#78e0ff;stroke-opacity:.65}
      .num{font:700 12px DejaVu Sans, Arial, sans-serif;fill:#f0fcff;text-anchor:middle}
      .block{font:700 21px DejaVu Sans, Arial, sans-serif;fill:#f0fbff;text-anchor:middle}
      .desc{font:400 14px DejaVu Sans, Arial, sans-serif;fill:#b9d9ea;text-anchor:middle}
      .line{stroke:#78dcff;stroke-width:3;stroke-linecap:round;marker-end:url(#arrow)}
      .feedback{stroke:#b093ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .icon{stroke:#7ee4ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .icon2{stroke:#a987ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .muted{stroke:#7ee4ff;stroke-opacity:.35;stroke-width:1}
      .footerStrong{font:700 18px DejaVu Sans, Arial, sans-serif;fill:#effbff}
      .footer{font:400 18px DejaVu Sans, Arial, sans-serif;fill:#bddff0}
    </style>
  </defs>

  <rect width="1600" height="560" fill="url(#bg)"/>
  <rect width="1600" height="560" fill="url(#g1)"/>
  <rect width="1600" height="560" fill="url(#g2)"/>
  <g opacity="0.22">
    <path d="M0 70H1600M0 120H1600M0 170H1600M0 220H1600M0 270H1600M0 320H1600M0 370H1600M0 420H1600M0 470H1600M0 520H1600" stroke="#70cfff"/>
    <path d="M50 0V560M100 0V560M150 0V560M200 0V560M250 0V560M300 0V560M350 0V560M400 0V560M450 0V560M500 0V560M550 0V560M600 0V560M650 0V560M700 0V560M750 0V560M800 0V560M850 0V560M900 0V560M950 0V560M1000 0V560M1050 0V560M1100 0V560M1150 0V560M1200 0V560M1250 0V560M1300 0V560M1350 0V560M1400 0V560M1450 0V560M1500 0V560M1550 0V560" stroke="#70cfff"/>
  </g>
  <rect x="18" y="18" width="1564" height="524" rx="24" stroke="#5ccfff" stroke-opacity="0.25" stroke-width="2"/>

  <text x="54" y="67" class="title">Zynq SDR Course: Engineering Learning Path</text>
  <text x="56" y="103" class="subtitle">theory → modeling → fixed-point DSP → HDL/FPGA → RF hardware → measurement → engineering report</text>


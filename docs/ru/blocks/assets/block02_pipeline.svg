<svg width="1500" height="470" viewBox="0 0 1500 470" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bg" x1="0" y1="0" x2="1500" y2="470"><stop stop-color="#071426"/><stop offset="1" stop-color="#102b4a"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10 Z" fill="#78dcff"/></marker><style>.title{font:700 34px DejaVu Sans,Arial,sans-serif;fill:#ecfbff}.sub{font:400 18px DejaVu Sans,Arial,sans-serif;fill:#b6e3f6}.card{fill:#0f2948;stroke:#62d2ff;stroke-width:2}.num{font:700 12px DejaVu Sans,Arial,sans-serif;fill:#f0fcff;text-anchor:middle}.bt{font:700 21px DejaVu Sans,Arial,sans-serif;fill:#f0fbff;text-anchor:middle}.desc{font:400 14px DejaVu Sans,Arial,sans-serif;fill:#b9d9ea;text-anchor:middle}.line{stroke:#78dcff;stroke-width:3;stroke-linecap:round;marker-end:url(#arrow)}.fb{stroke:#b093ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.icon{stroke:#7ee4ff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.muted{stroke:#7ee4ff;stroke-opacity:.35;stroke-width:1}.foot{font:400 17px DejaVu Sans,Arial,sans-serif;fill:#bddff0}.strong{font:700 17px DejaVu Sans,Arial,sans-serif;fill:#effbff}</style></defs><rect width="1500" height="470" fill="url(#bg)"/><rect x="18" y="18" width="1464" height="434" rx="24" stroke="#5ccfff" stroke-opacity=".25" stroke-width="2"/><text x="54" y="65" class="title">Block 2: Signals, Spectrum, Sampling and I/Q</text><text x="56" y="100" class="sub">turn a captured waveform into correctly interpreted engineering data</text><g transform="translate(56 165)"><g><rect class="card" width="190" height="135" rx="18"/><text class="num" x="29" y="30">01</text><path class="icon" d="M55 64 C67 38 78 90 90 64 S113 38 125 64 S148 90 160 64"/><path class="muted" d="M52 64H163"/><text class="bt" x="95" y="101">Signal</text><text class="desc" x="95" y="122">tone, level, phase</text></g><g transform="translate(215 0)"><rect class="card" width="190" height="135" rx="18"/><text class="num" x="29" y="30">02</text><path class="icon" d="M58 80V45M78 80V32M98 80V50M118 80V28M138 80V58"/><path class="muted" d="M50 80H150"/><text class="bt" x="95" y="101">Sampling</text><text class="desc" x="95" y="122">Fs, Nyquist, aliasing</text></g><g transform="translate(430 0)"><rect class="card" width="190" height="135" rx="18"/><text class="num" x="29" y="30">03</text><path class="icon" d="M55 82H155M55 82V35"/><text class="bt" x="95" y="101">FFT</text><text class="desc" x="95" y="122">bins, window, leakage</text></g><g transform="translate(645 0)"><rect class="card" width="190" height="135" rx="18"/><text class="num" x="29" y="30">04</text><path class="muted" d="M52 64H158M105 28V92"/><circle cx="80" cy="46" r="5" fill="#7ee4ff"/><circle cx="130" cy="46" r="5" fill="#7ee4ff"/><circle cx="80" cy="82" r="5" fill="#a987ff"/><circle cx="130" cy="82" r="5" fill="#a987ff"/><text class="bt" x="95" y="101">I/Q</text><text class="desc" x="95" y="122">complex baseband</text></g><g transform="translate(860 0)"><rect class="card" width="190" height="135" rx="18"/><text class="num" x="29" y="30">05</text><text x="60" y="55" style="font:400 14px DejaVu Sans,Arial;fill:#7ee4ff">Fs / Fc / CI16</text><text x="60" y="80" style="font:400 14px DejaVu Sans,Arial;fill:#7ee4ff">gain / duration</text><text class="bt" x="95" y="101">Metadata</text><text class="desc" x="95" y="122">format, gain, duration</text></g><g transform="translate(1075 0)"><rect class="card" width="190" height="135" rx="18"/><text class="num" x="29" y="30">06</text><rect x="56" y="39" width="80" height="48" rx="8" fill="#143c5f" stroke="#7ee4ff" stroke-width="3"/><text class="bt" x="95" y="101">Validation</text><text class="desc" x="95" y="122">axis and error checks</text></g><path class="line" d="M194 67H207"/><path class="line" d="M409 67H422"/><path class="line" d="M624 67H637"/><path class="line" d="M839 6